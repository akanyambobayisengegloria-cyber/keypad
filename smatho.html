<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Home Dashboard</title>

<!-- Font Awesome CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
/* GENERAL */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f4f6f9;}
button{cursor:pointer;}
.container{display:flex;}

/* SIDEBAR */
.sidebar{width:220px;background:#1e1e2f;color:white;padding:20px;height:100vh;}
.sidebar h2{margin-bottom:20px;}
.sidebar li{margin:15px 0;cursor:pointer;}
.sidebar li:hover{color:#4CAF50;}

/* MAIN */
main{flex:1;padding:20px;}
.topbar{display:flex;justify-content:space-between;background:white;padding:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-top:20px;}

/* CARD */
.card{background:white;padding:15px;border-radius:10px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.actions{display:flex;justify-content:space-between;margin-top:10px;}
.edit-btn{background:#4CAF50;color:white;border:none;padding:5px;border-radius:5px;}
.delete-btn{background:red;color:white;border:none;padding:5px;border-radius:5px;}

/* SWITCH */
.switch{width:50px;height:24px;position:relative;margin-top:5px;}
.switch input{display:none;}
.slider{position:absolute;background:#ccc;top:0;bottom:0;left:0;right:0;border-radius:20px;}
.slider:before{content:"";position:absolute;width:18px;height:18px;background:white;left:3px;bottom:3px;border-radius:50%;}
input:checked+.slider{background:#4CAF50;}
input:checked+.slider:before{transform:translateX(26px);}

/* ADD FORM */
#add-form{margin-top:10px;background:white;padding:10px;border-radius:10px;display:none;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
#add-form input, #add-form button{width:100%;margin-top:5px;padding:8px;border-radius:5px;border:1px solid #ccc;}

/* MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
.modal-box{background:white;padding:20px;border-radius:10px;width:300px;}
.modal-box input, .modal-box button{width:100%;padding:8px;margin-top:5px;border-radius:5px;border:1px solid #ccc;}
.modal-box button{background:#4CAF50;color:white;border:none;}

/* ICONS */
.card i{margin-right:8px;}
</style>
</head>
<body>

<div class="container">

<nav class="sidebar">
<h2>SmartHome</h2>
<ul>
<li onclick="showDashboard()">🏠 Dashboard</li>
<li onclick="showRoom('Bedroom')"><i class="fa-solid fa-bed"></i> Bedroom</li>
<li onclick="showRoom('Bathroom')"><i class="fa-solid fa-bath"></i> Bathroom</li>
<li onclick="showRoom('Saloon')"><i class="fa-solid fa-couch"></i> Saloon</li>
<li onclick="showRoom('Kitchen')"><i class="fa-solid fa-kitchen-set"></i> Kitchen</li>
<li onclick="showRoom('Toilet')"><i class="fa-solid fa-toilet"></i> Toilet</li>
<li onclick="showRoom('Camera')"><i class="fa-solid fa-camera"></i> Camera</li>
</ul>
</nav>

<main>
<div class="topbar">
<h2 id="title">Dashboard</h2>
</div>

<section id="dashboard">
<h3>Welcome to Smart Home</h3>
<p>Select a room from the sidebar to view appliances.</p>
</section>

<section id="room" style="display:none;">
<button onclick="toggleForm()">+ Add Appliance</button>
<div id="add-form">
<input id="new-item" placeholder="Appliance name">
<button onclick="addItem()">Add</button>
</div>
<div class="cards" id="cards"></div>
</section>

<section id="camera" style="display:none;">
<h3>Camera</h3>
<video id="video" width="300" autoplay></video>
<br>
<button onclick="startCamera()">Start Camera</button>
</section>

</main>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<input id="edit-input">
<button onclick="saveEdit()">Save</button>
</div>
</div>

<script>
// DATA with icons
let rooms={
Bedroom:[{name:"Bed",icon:"fa-bed"},{name:"Cabinet",icon:"fa-briefcase"},{name:"Shoes Rack",icon:"fa-shoe-prints"},{name:"Light",icon:"fa-lightbulb"},{name:"AC",icon:"fa-fan"},{name:"Socket",icon:"fa-plug"},{name:"Window",icon:"fa-window-maximize"},{name:"Door",icon:"fa-door-closed"}],
Bathroom:[{name:"Shower",icon:"fa-shower"},{name:"Mirror",icon:"fa-mirror"},{name:"Light",icon:"fa-lightbulb"},{name:"Socket",icon:"fa-plug"}],
Saloon:[{name:"TV",icon:"fa-tv"},{name:"Sofa",icon:"fa-couch"},{name:"Lamp",icon:"fa-lightbulb"},{name:"Bell",icon:"fa-bell"},{name:"Socket",icon:"fa-plug"},{name:"Window",icon:"fa-window-maximize"},{name:"Door",icon:"fa-door-closed"}],
Kitchen:[{name:"Fridge",icon:"fa-snowflake"},{name:"Gas Detector",icon:"fa-fire-extinguisher"},{name:"Oven",icon:"fa-burn"},{name:"Light",icon:"fa-lightbulb"},{name:"Socket",icon:"fa-plug"},{name:"WiFi",icon:"fa-wifi"},{name:"Window",icon:"fa-window-maximize"},{name:"Door",icon:"fa-door-closed"}],
Toilet:[{name:"Toilet",icon:"fa-toilet"},{name:"Light",icon:"fa-lightbulb"},{name:"Socket",icon:"fa-plug"}],
Camera:[{name:"Camera",icon:"fa-camera"}]
};

let currentRoom="";
let editIndex=null;

// NAVIGATION
function showDashboard(){
hideAll();
document.getElementById("dashboard").style.display="block";
document.getElementById("title").innerText="Dashboard";
}

function showRoom(r){
currentRoom=r;
hideAll();
if(r==="Camera"){
document.getElementById("camera").style.display="block";
}else{
document.getElementById("room").style.display="block";
render();
}
document.getElementById("title").innerText=r;
}

function hideAll(){
document.getElementById("dashboard").style.display="none";
document.getElementById("room").style.display="none";
document.getElementById("camera").style.display="none";
}

// RENDER CARDS
function render(){
const c=document.getElementById("cards");
c.innerHTML="";
rooms[currentRoom].forEach((item,i)=>{
const card=document.createElement("div");
card.className="card";
card.innerHTML=`
<h3><i class="fa-solid ${item.icon}"></i> ${item.name}</h3>
<label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
<div class="actions">
<button class="edit-btn">Edit</button>
<button class="delete-btn">Delete</button>
</div>
`;
c.appendChild(card);

// DELETE
card.querySelector(".delete-btn").onclick=()=>{
rooms[currentRoom].splice(i,1);
render();
};

// EDIT
card.querySelector(".edit-btn").onclick=()=>{
editIndex=i;
document.getElementById("edit-input").value=item.name;
document.getElementById("modal").style.display="flex";
};
});
}

// ADD APPLIANCE
function toggleForm(){
const f=document.getElementById("add-form");
f.style.display=f.style.display==="block"?"none":"block";
}

function addItem(){
const val=document.getElementById("new-item").value;
if(!val) return alert("Enter appliance name");
rooms[currentRoom].push({name:val,icon:"fa-plug"});
render();
document.getElementById("new-item").value="";
}

// SAVE EDIT
function saveEdit(){
const val=document.getElementById("edit-input").value;
rooms[currentRoom][editIndex].name=val;
document.getElementById("modal").style.display="none";
render();
}

// CAMERA
function startCamera(){
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{document.getElementById("video").srcObject=stream;});
}

// INITIAL DASHBOARD
showDashboard();
</script>

</body>
</html>
